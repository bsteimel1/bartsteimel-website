<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bart Steimel — Videos</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e8e8e8;
      --muted: #888;
      --accent: #c8a96e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.2rem 2.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-name {
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-decoration: none;
      font-style: italic;
    }

    .nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--accent); }

    header {
      text-align: center;
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }

    header p {
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.08em;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(480px, 1fr));
      gap: 2rem;
      padding: 2.5rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .video-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border: none;
    }

    footer {
      text-align: center;
      padding: 2.5rem;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
    }

    footer a { color: var(--muted); text-decoration: none; }
    footer a:hover { color: var(--text); }

    @media (max-width: 600px) {
      .video-grid {
        grid-template-columns: 1fr;
        padding: 1.2rem;
      }
      nav { padding: 1rem 1.2rem; }
      .nav-links { gap: 1.2rem; }
    }
  </style>
</head>
<body>

  <nav>
    <a class="nav-name" href="index.html">Bart Steimel</a>
    <ul class="nav-links">
      <li><a href="index.html">Music</a></li>
      <li><a href="videos.html" class="active">Videos</a></li>
    </ul>
  </nav>

  <header>

    <p>Watch &amp; listen</p>
  </header>

  <main class="video-grid">

    <div class="video-card">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/sQALpvQpkP0"

          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="video-card">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/f_BPXQfO8m4"
          title="Bart Steimel video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>
    </div>

    <div class="video-card">
      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/cd-_R-eR-Ek"
          title="Bart Steimel video"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"

    <div class="video-card">
      <div class="video-wrapper">

  <footer>

</body>
</html>
